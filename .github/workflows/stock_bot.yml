name: Yahoo Stock Telegram Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # 每 5 分鐘（GitHub 允許的最短週期）:contentReference[oaicite:7]{index=7}
  workflow_dispatch:        # 允許手動按 Run

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 可選：自訂隨機池（逗號分隔）
          # SYMBOLS: "2330.TW,2454.TW,2317.TW"
        run: python stock_bot.py
